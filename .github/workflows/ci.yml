name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: aicm_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d aicm_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E suites
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/aicm_ci?sslmode=disable
          PORT: 8900
          JWT_SECRET: ci-secret
          FRONTEND_ORIGIN: http://127.0.0.1:7200
          GROQ_API_KEY: ci-placeholder-key
          GROQ_MODEL: llama-3.1-8b-instant
          E2E_BASE_URL: http://127.0.0.1:7200
          E2E_API_URL: http://127.0.0.1:8900
        run: npx playwright test --project=chromium

      - name: Upload E2E traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Coverage snapshot
        run: go tool cover -func=coverage.out

      - name: Enforce backend coverage threshold
        env:
          MIN_BACKEND_COVERAGE: "8.5"
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Backend total coverage: ${total}%"
          awk -v total="$total" -v min="$MIN_BACKEND_COVERAGE" 'BEGIN { if ((total + 0) < (min + 0)) { printf("Coverage %.1f%% is below required %.1f%%\n", total, min); exit 1 } }'

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  docker-build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: aicm-backend-ci
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: aicm-frontend-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        run: |
          docker build \
            --file ${{ matrix.dockerfile }} \
            --tag ${{ matrix.image }} \
            ${{ matrix.context }}

  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - frontend-e2e
      - backend-quality
      - docker-build-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aicm-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/aicm-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aicm-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/aicm-frontend:${{ github.sha }}

  deploy-practice:
    name: Deploy Practice VM
    runs-on: ubuntu-latest
    needs:
      - docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Evaluate deploy switch
        id: gate
        shell: bash
        env:
          AUTO_DEPLOY_ENABLED: ${{ secrets.AUTO_DEPLOY_ENABLED }}
        run: |
          value="${AUTO_DEPLOY_ENABLED:-true}"
          if [ "$value" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AUTO_DEPLOY_ENABLED=false, deploy step will be skipped."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "AUTO_DEPLOY_ENABLED is enabled."
          fi

      - name: Preflight deploy secrets and SSH reachability
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        env:
          AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          AZURE_VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${AZURE_VM_HOST:-}" ]; then
            echo "AZURE_VM_HOST secret is empty."
            exit 1
          fi

          if [ -z "${AZURE_VM_SSH_KEY:-}" ]; then
            echo "AZURE_VM_SSH_KEY secret is empty."
            exit 1
          fi

          if ! grep -q "BEGIN .*PRIVATE KEY" <<<"$AZURE_VM_SSH_KEY"; then
            echo "AZURE_VM_SSH_KEY does not look like a private key."
            exit 1
          fi

          echo "Checking SSH reachability on port 22..."
          if timeout 15 bash -c "cat < /dev/null > /dev/tcp/${AZURE_VM_HOST}/22"; then
            echo "SSH port is reachable from GitHub runner."
          else
            echo "Cannot reach host on port 22 from GitHub runner."
            echo "Check VM power state, NSG/firewall inbound rule for TCP/22, and AZURE_VM_HOST value."
            exit 1
          fi

      - name: Deploy to Azure VM over SSH
        if: steps.gate.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          debug: true
          script_stop: true
          script: |
            set -euo pipefail
            echo "Connected to $(hostname) as $(whoami)"
            APP_PATH="${{ secrets.AZURE_VM_APP_PATH }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$APP_PATH/.git" ]; then
              mkdir -p "$APP_PATH"

              if [ -z "$(find "$APP_PATH" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
                echo "First deploy bootstrap: cloning repo to $APP_PATH"
                git clone --depth 1 --branch main "$REPO_URL" "$APP_PATH"
              else
                echo "Bootstrap path exists and is non-empty without .git; initializing repository in place"
                git -C "$APP_PATH" init
                git -C "$APP_PATH" remote remove origin || true
                git -C "$APP_PATH" remote add origin "$REPO_URL"
                git -C "$APP_PATH" fetch --depth 1 origin main
                git -C "$APP_PATH" checkout -B main origin/main
              fi
            else
              echo "Updating existing repo checkout at $APP_PATH"
              git -C "$APP_PATH" fetch origin main
              git -C "$APP_PATH" checkout main
              git -C "$APP_PATH" pull --ff-only origin main
            fi

            cd "$APP_PATH"
            chmod +x deploy.sh
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" RUN_DEMO_SEED="${{ secrets.RUN_DEMO_SEED }}" ./deploy.sh
