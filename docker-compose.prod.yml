version: "3.8"
services:
  db:
    image: pgvector/pgvector:pg18
    container_name: aicm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicm_prod
      POSTGRES_PASSWORD: ${DB_PASSWORD:-super_secure_password_123}
      POSTGRES_DB: aicm_prod
    volumes:
      - pgdata_prod:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicm_prod -d aicm_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME:-yourusername}/aicm-backend:latest
    container_name: aicm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://aicm_prod:${DB_PASSWORD:-super_secure_password_123}@db:5432/aicm_prod?sslmode=disable
      - PORT=8900
      - FRONTEND_ORIGIN=http://localhost
      - JWT_SECRET=${JWT_SECRET:-your_secure_jwt_secret}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.1-8b-instant

  frontend:
    image: ${DOCKER_USERNAME:-yourusername}/aicm-frontend:latest
    container_name: aicm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata_prod:
